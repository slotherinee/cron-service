services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crondb
      POSTGRES_USER: cronuser
      POSTGRES_PASSWORD: cronpass
    ports:
      - '5432:5432'

  api:
    build: ./services/api
    ports:
      - '3000:3000'
    env_file: .env
    depends_on:
      - postgres
      - rabbitmq
